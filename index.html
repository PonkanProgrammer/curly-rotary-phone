<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学校サバイバル：職員室の6時間</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #161f38;
      --ink: #e8edff;
      --accent: #5ef3ff;
      --danger: #ff5d8f;
      --ok: #78ffb0;
      --warn: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 30% 20%, #18264d, var(--bg));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .game {
      width: min(980px, 95vw);
      border: 3px solid #273458;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.15));
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    .header {
      padding: 12px;
      border-bottom: 1px solid #2b3a61;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      background: #121a31;
      font-weight: 700;
    }
    .meter {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #0a0f1e;
      overflow: hidden;
      margin-top: 4px;
    }
    .meter > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--ok), var(--warn), var(--danger));
      width: 100%;
      transition: width .25s;
    }
    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      min-height: 480px;
    }
    .office {
      position: relative;
      background: repeating-linear-gradient(
        -45deg,
        #0f1730,
        #0f1730 14px,
        #111d3b 14px,
        #111d3b 28px
      );
      border-right: 1px solid #2b3a61;
      padding: 16px;
    }
    .corridor {
      height: 240px;
      border: 2px dashed #324575;
      border-radius: 10px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 1.05rem;
    }
    .lane {
      border: 1px solid #355088;
      border-radius: 8px;
      padding: 8px;
      position: relative;
      background: rgba(0, 0, 0, 0.18);
    }
    .status {
      margin-top: 12px;
      line-height: 1.7;
      font-size: .98rem;
    }
    .sidebar {
      padding: 12px;
      background: #111a32;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: .97rem;
      font-weight: 700;
      color: #fff;
      background: #2b4c9a;
      cursor: pointer;
      transition: transform .05s, filter .2s;
    }
    button:active { transform: translateY(1px); }
    button.active { background: #8653ff; }
    button.warn { background: #a14d10; }
    button.danger { background: #8d1e47; }
    #log {
      margin: 0;
      padding: 10px;
      height: 220px;
      overflow: auto;
      border-radius: 10px;
      background: #0b1226;
      border: 1px solid #2a3c67;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .85rem;
      white-space: pre-wrap;
    }
    .footer {
      padding: 10px 12px;
      border-top: 1px solid #2b3a61;
      background: #10182d;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .small { opacity: .85; font-size: .9rem; }
    .dangerText { color: #ff8fb2; font-weight: 700; }
    @media (max-width: 780px) {
      .header { grid-template-columns: repeat(2, 1fr); }
      .main { grid-template-columns: 1fr; }
      .office { border-right: 0; border-bottom: 1px solid #2b3a61; }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="学校サバイバルゲーム">
    <section class="header">
      <div>🕛 時間: <span id="hour">12 AM</span></div>
      <div>🔋 電力: <span id="powerText">100%</span>
        <div class="meter"><span id="powerBar"></span></div>
      </div>
      <div>😱 緊張値: <span id="fear">0</span>/100</div>
      <div>🏆 ベスト: <span id="best">0</span> 夜</div>
    </section>

    <section class="main">
      <div class="office">
        <h1>学校サバイバル：職員室の6時間</h1>
        <p class="small">FNAF風：6AMまで生き残れ！左右のドア管理とカメラ確認で「見回り先生」をしのごう。</p>
        <div class="corridor">
          <div class="lane">
            <strong>左廊下</strong>
            <p id="leftState">静か…（距離: 5）</p>
            <p id="leftDoor">ドア: 開</p>
          </div>
          <div class="lane">
            <strong>右廊下</strong>
            <p id="rightState">静か…（距離: 5）</p>
            <p id="rightDoor">ドア: 開</p>
          </div>
        </div>
        <div class="status">
          <div>📷 カメラ: <span id="camState">OFF</span></div>
          <div>💡 廊下ライト: <span id="lightState">OFF</span></div>
          <div id="message">「今夜だけ当番お願い！」と言われたあなた…。</div>
        </div>
      </div>

      <aside class="sidebar">
        <button id="startBtn">ゲーム開始 / リスタート</button>
        <button id="leftDoorBtn" class="danger">左ドア 閉める</button>
        <button id="rightDoorBtn" class="danger">右ドア 閉める</button>
        <button id="lightBtn" class="warn">廊下ライト ON/OFF</button>
        <button id="camBtn">防犯カメラ ON/OFF</button>
        <pre id="log" aria-live="polite"></pre>
      </aside>
    </section>

    <section class="footer">
      <span class="small">操作: ボタン / キーボード A(左ドア), D(右ドア), L(ライト), C(カメラ)</span>
      <span id="result" class="dangerText"></span>
    </section>
  </main>

  <script>
    const el = (id) => document.getElementById(id);

    const ui = {
      hour: el("hour"), powerText: el("powerText"), powerBar: el("powerBar"), fear: el("fear"),
      best: el("best"), leftState: el("leftState"), rightState: el("rightState"),
      leftDoor: el("leftDoor"), rightDoor: el("rightDoor"), camState: el("camState"),
      lightState: el("lightState"), message: el("message"), log: el("log"), result: el("result"),
      startBtn: el("startBtn"), leftDoorBtn: el("leftDoorBtn"), rightDoorBtn: el("rightDoorBtn"),
      lightBtn: el("lightBtn"), camBtn: el("camBtn")
    };

    const state = {
      running: false,
      night: 1,
      bestNight: Number(localStorage.getItem("schoolSurvivalBestNight") || 0),
      power: 100,
      fear: 0,
      hourProgress: 0,
      leftDist: 5,
      rightDist: 5,
      leftDoorClosed: false,
      rightDoorClosed: false,
      lightOn: false,
      camOn: false,
      tickTimer: null
    };

    ui.best.textContent = String(state.bestNight);

    function log(msg) {
      const stamp = new Date().toLocaleTimeString("ja-JP", { hour12: false });
      ui.log.textContent = `[${stamp}] ${msg}\n` + ui.log.textContent.slice(0, 1700);
    }

    function updateUI() {
      const hour = 12 + Math.floor(state.hourProgress / 10);
      const display = hour >= 13 ? `${hour - 12} AM` : `${hour} AM`;
      ui.hour.textContent = display;
      ui.powerText.textContent = `${Math.max(0, Math.floor(state.power))}%`;
      ui.powerBar.style.width = `${Math.max(0, state.power)}%`;
      ui.fear.textContent = String(Math.floor(state.fear));
      ui.leftState.textContent = state.leftDist <= 0 ? "先生が目の前！" : `物音あり…（距離: ${state.leftDist}）`;
      ui.rightState.textContent = state.rightDist <= 0 ? "先生が目の前！" : `足音が近い…（距離: ${state.rightDist}）`;
      ui.leftDoor.textContent = `ドア: ${state.leftDoorClosed ? "閉" : "開"}`;
      ui.rightDoor.textContent = `ドア: ${state.rightDoorClosed ? "閉" : "開"}`;
      ui.camState.textContent = state.camOn ? "ON" : "OFF";
      ui.lightState.textContent = state.lightOn ? "ON" : "OFF";

      ui.leftDoorBtn.textContent = state.leftDoorClosed ? "左ドア 開ける" : "左ドア 閉める";
      ui.rightDoorBtn.textContent = state.rightDoorClosed ? "右ドア 開ける" : "右ドア 閉める";
      ui.camBtn.classList.toggle("active", state.camOn);
      ui.lightBtn.classList.toggle("active", state.lightOn);
    }

    function resetGame() {
      state.power = 100;
      state.fear = 0;
      state.hourProgress = 0;
      state.leftDist = 5;
      state.rightDist = 5;
      state.leftDoorClosed = false;
      state.rightDoorClosed = false;
      state.lightOn = false;
      state.camOn = false;
      ui.result.textContent = "";
      ui.message.textContent = "校内放送『不審者ではなく見回りです』…逆にこわい。";
      ui.log.textContent = "";
      updateUI();
    }

    function endGame(win) {
      state.running = false;
      clearInterval(state.tickTimer);
      if (win) {
        state.night += 1;
        state.bestNight = Math.max(state.bestNight, state.night - 1);
        localStorage.setItem("schoolSurvivalBestNight", String(state.bestNight));
        ui.best.textContent = String(state.bestNight);
        ui.result.textContent = "🎉 6AM到達！あなたは伝説の当番。次の夜へ…";
        log("生還成功。カップ焼きそばで祝勝会！");
      } else {
        ui.result.textContent = "💥 見回り先生に発見された！『こんな時間に何してるの？』";
      }
    }

    function consumePower() {
      let drain = 0.2;
      if (state.leftDoorClosed) drain += 0.35;
      if (state.rightDoorClosed) drain += 0.35;
      if (state.lightOn) drain += 0.45;
      if (state.camOn) drain += 0.55;
      state.power -= drain;
      if (state.power <= 0) {
        state.power = 0;
        state.lightOn = false;
        state.camOn = false;
        state.leftDoorClosed = false;
        state.rightDoorClosed = false;
        state.fear += 3.2;
        ui.message.textContent = "停電！暗闇で足音だけが響く…";
      }
    }

    function enemyAI() {
      const moveChance = state.camOn ? 0.35 : 0.6;
      if (Math.random() < moveChance) state.leftDist -= 1;
      if (Math.random() < moveChance) state.rightDist -= 1;

      if (state.lightOn && Math.random() < 0.5) {
        state.leftDist = Math.min(state.leftDist + 1, 5);
        state.rightDist = Math.min(state.rightDist + 1, 5);
        log("ライトで影が逃げた！");
      }

      const leftBreach = state.leftDist <= 0 && !state.leftDoorClosed;
      const rightBreach = state.rightDist <= 0 && !state.rightDoorClosed;
      if (leftBreach || rightBreach) {
        endGame(false);
        return;
      }

      if (state.leftDist <= 0 && state.leftDoorClosed && Math.random() < 0.35) {
        state.leftDist = 2;
        log("左ドアをガタガタ…先生は去った！");
      }
      if (state.rightDist <= 0 && state.rightDoorClosed && Math.random() < 0.35) {
        state.rightDist = 2;
        log("右ドアにノック音、しばらくして静かに。");
      }
    }

    function tick() {
      if (!state.running) return;
      state.hourProgress += 1;
      consumePower();
      enemyAI();

      state.fear += (state.camOn ? 0.1 : 0.35) + (state.power <= 15 ? 0.45 : 0);
      if (state.fear >= 100) {
        ui.message.textContent = "パニックで動けない…！";
        endGame(false);
      }

      if (state.hourProgress % 10 === 0) {
        ui.message.textContent = `現在 ${ui.hour.textContent}。朝まであと少し…？`;
      }

      if (state.hourProgress >= 60) endGame(true);
      updateUI();
    }

    function toggleLeftDoor() {
      if (!state.running) return;
      state.leftDoorClosed = !state.leftDoorClosed;
      log(`左ドアを${state.leftDoorClosed ? "閉めた" : "開けた"}。`);
      updateUI();
    }

    function toggleRightDoor() {
      if (!state.running) return;
      state.rightDoorClosed = !state.rightDoorClosed;
      log(`右ドアを${state.rightDoorClosed ? "閉めた" : "開けた"}。`);
      updateUI();
    }

    function toggleLight() {
      if (!state.running || state.power <= 0) return;
      state.lightOn = !state.lightOn;
      log(`ライト ${state.lightOn ? "ON" : "OFF"}`);
      updateUI();
    }

    function toggleCam() {
      if (!state.running || state.power <= 0) return;
      state.camOn = !state.camOn;
      log(`カメラ ${state.camOn ? "ON" : "OFF"}`);
      updateUI();
    }

    function startGame() {
      clearInterval(state.tickTimer);
      state.running = true;
      resetGame();
      log(`Night ${state.night} 開始。職員室で朝まで耐えろ！`);
      state.tickTimer = setInterval(tick, 1000);
    }

    ui.startBtn.addEventListener("click", startGame);
    ui.leftDoorBtn.addEventListener("click", toggleLeftDoor);
    ui.rightDoorBtn.addEventListener("click", toggleRightDoor);
    ui.lightBtn.addEventListener("click", toggleLight);
    ui.camBtn.addEventListener("click", toggleCam);

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "a") toggleLeftDoor();
      if (key === "d") toggleRightDoor();
      if (key === "l") toggleLight();
      if (key === "c") toggleCam();
    });

    updateUI();
  </script>
</body>
</html>
