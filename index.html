<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>学校サバイバル 3D - Night Watch</title>
  <style>
    :root {
      --bg: #0a1020;
      --panel: #121a31cc;
      --line: #2f4b87;
      --text: #edf3ff;
      --danger: #ff6b95;
      --ok: #7bffbc;
      --warn: #ffd166;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: "Yu Gothic", sans-serif; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed;
      top: 12px; left: 12px; right: 12px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      pointer-events: none;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      backdrop-filter: blur(2px);
      font-weight: 700;
    }
    .meter { margin-top: 4px; height: 8px; border-radius: 999px; background: #070d1d; overflow: hidden; }
    .meter > span { display: block; height: 100%; width: 100%; background: linear-gradient(90deg,var(--ok),var(--warn),var(--danger)); }
    #controls {
      position: fixed;
      left: 12px; bottom: 12px;
      width: min(460px, calc(100vw - 24px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      pointer-events: auto;
    }
    #buttons { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 8px; }
    button {
      border: 1px solid #4366b5;
      border-radius: 8px;
      background: #223b73;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      padding: 9px;
    }
    button.active { background: #7e4bff; }
    button.danger { background: #88264b; border-color: #c34a77; }
    #log {
      margin: 0;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #274177;
      background: #0a1228;
      height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      font: 12px/1.45 ui-monospace, Menlo, monospace;
    }
    #result {
      position: fixed;
      right: 12px;
      bottom: 12px;
      width: min(360px, calc(100vw - 24px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-weight: 800;
    }
    @media (max-width: 860px) {
      #hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <section id="hud" aria-label="HUD">
    <div class="card">🕛 時間: <span id="hour">12 AM</span></div>
    <div class="card">🔋 電力: <span id="powerText">100%</span><div class="meter"><span id="powerBar"></span></div></div>
    <div class="card">😱 緊張値: <span id="fear">0</span>/100</div>
    <div class="card">🎯 進捗: <span id="progress">0</span>%</div>
    <div class="card">🏆 ベスト夜: <span id="bestNight">0</span></div>
  </section>

  <section id="controls">
    <div id="buttons">
      <button id="startBtn">開始 / リスタート</button>
      <button id="camBtn">カメラ切替 (C)</button>
      <button id="leftBtn" class="danger">左ドア (Q)</button>
      <button id="rightBtn" class="danger">右ドア (E)</button>
      <button id="lightBtn">ライト (F)</button>
    </div>
    <pre id="log" aria-live="polite"></pre>
  </section>

  <section id="result">3D版へ更新！開始ボタンを押して夜を耐えよう。</section>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';

    const ui = {
      hour: document.getElementById('hour'),
      powerText: document.getElementById('powerText'),
      powerBar: document.getElementById('powerBar'),
      fear: document.getElementById('fear'),
      progress: document.getElementById('progress'),
      bestNight: document.getElementById('bestNight'),
      result: document.getElementById('result'),
      log: document.getElementById('log'),
      startBtn: document.getElementById('startBtn'),
      camBtn: document.getElementById('camBtn'),
      leftBtn: document.getElementById('leftBtn'),
      rightBtn: document.getElementById('rightBtn'),
      lightBtn: document.getElementById('lightBtn')
    };

    const state = {
      running: false,
      night: 1,
      bestNight: Number(localStorage.getItem('school3dBestNight') || 0),
      power: 100,
      fear: 0,
      t: 0,
      leftDoor: false,
      rightDoor: false,
      light: false,
      camMode: false,
      leftEnemyDist: 20,
      rightEnemyDist: 20,
      leftEnemySpeed: 0.08,
      rightEnemySpeed: 0.08
    };
    ui.bestNight.textContent = String(state.bestNight);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.getElementById('app').appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x090f1f);
    scene.fog = new THREE.Fog(0x090f1f, 12, 90);

    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 4.5, 12);

    const ambient = new THREE.AmbientLight(0x5f77aa, 0.45);
    scene.add(ambient);
    const spot = new THREE.SpotLight(0xbad2ff, 1.4, 90, 0.6, 0.8, 1.2);
    spot.position.set(0, 10, 11);
    spot.target.position.set(0, 2, -18);
    scene.add(spot, spot.target);

    const hallLight = new THREE.PointLight(0xffddaa, 0, 45, 2);
    hallLight.position.set(0, 4, -16);
    scene.add(hallLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 90),
      new THREE.MeshStandardMaterial({ color: 0x1a2749, roughness: 0.9, metalness: 0.08 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.z = -20;
    scene.add(floor);

    function wall(w, h, d, x, y, z, c = 0x1d2f58) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: c, roughness: 0.7 }));
      m.position.set(x, y, z);
      scene.add(m);
      return m;
    }

    wall(0.8, 6, 70, -8, 3, -20);
    wall(0.8, 6, 70, 8, 3, -20);
    wall(16, 6, 0.8, 0, 3, -55);
    wall(16, 0.8, 70, 0, 6, -20, 0x1a294f);

    const desk = wall(5.4, 1.2, 2, 0, 1.1, 7, 0x3f2f27);
    wall(0.45, 2.2, 0.45, -2.2, 1.1, 7, 0x2f1f18);
    wall(0.45, 2.2, 0.45, 2.2, 1.1, 7, 0x2f1f18);

    const leftDoor = wall(0.3, 4.2, 3.5, -6.7, 2.1, -1, 0x5e1830);
    const rightDoor = wall(0.3, 4.2, 3.5, 6.7, 2.1, -1, 0x5e1830);
    leftDoor.scale.y = 0.06;
    rightDoor.scale.y = 0.06;

    const leftEnemy = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.55, 1.7, 8, 16),
      new THREE.MeshStandardMaterial({ color: 0xff7aa5, emissive: 0x25000e })
    );
    leftEnemy.position.set(-4.1, 1.45, -30);
    scene.add(leftEnemy);

    const rightEnemy = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.55, 1.7, 8, 16),
      new THREE.MeshStandardMaterial({ color: 0xffbf6a, emissive: 0x2a1200 })
    );
    rightEnemy.position.set(4.1, 1.45, -30);
    scene.add(rightEnemy);

    const clock = new THREE.Clock();

    function log(msg) {
      const now = new Date().toLocaleTimeString('ja-JP', { hour12: false });
      ui.log.textContent = `[${now}] ${msg}\n` + ui.log.textContent.slice(0, 1800);
    }

    function setButtonStates() {
      ui.leftBtn.classList.toggle('active', state.leftDoor);
      ui.rightBtn.classList.toggle('active', state.rightDoor);
      ui.lightBtn.classList.toggle('active', state.light);
      ui.camBtn.classList.toggle('active', state.camMode);
    }

    function resetNight() {
      state.power = 100;
      state.fear = 0;
      state.t = 0;
      state.leftDoor = false;
      state.rightDoor = false;
      state.light = false;
      state.camMode = false;
      state.leftEnemyDist = 20;
      state.rightEnemyDist = 20;
      state.leftEnemySpeed = 0.09 + (state.night - 1) * 0.012;
      state.rightEnemySpeed = 0.085 + (state.night - 1) * 0.012;
      ui.result.textContent = `Night ${state.night} 開始。6AMまで生存せよ。`;
      ui.log.textContent = '';
      log('当番スタート。廊下が静かすぎる…。');
      setButtonStates();
    }

    function toggleLeftDoor() {
      if (!state.running || state.power <= 0) return;
      state.leftDoor = !state.leftDoor;
      log(`左ドア ${state.leftDoor ? '閉' : '開'}`);
      setButtonStates();
    }

    function toggleRightDoor() {
      if (!state.running || state.power <= 0) return;
      state.rightDoor = !state.rightDoor;
      log(`右ドア ${state.rightDoor ? '閉' : '開'}`);
      setButtonStates();
    }

    function toggleLight() {
      if (!state.running || state.power <= 0) return;
      state.light = !state.light;
      hallLight.intensity = state.light ? 1.45 : 0;
      log(`ライト ${state.light ? 'ON' : 'OFF'}`);
      setButtonStates();
    }

    function toggleCam() {
      if (!state.running) return;
      state.camMode = !state.camMode;
      log(`カメラモード ${state.camMode ? 'ON' : 'OFF'}`);
      setButtonStates();
    }

    function endNight(win) {
      state.running = false;
      if (win) {
        ui.result.textContent = '🎉 6AM！生存成功！';
        log('朝になった。牛乳で乾杯。');
        state.bestNight = Math.max(state.bestNight, state.night);
        state.night += 1;
        localStorage.setItem('school3dBestNight', String(state.bestNight));
        ui.bestNight.textContent = String(state.bestNight);
      } else {
        ui.result.textContent = '💥 見回り先生に見つかった！「この時間に何してる？」';
      }
    }

    function updateGame(dt) {
      if (!state.running) return;
      state.t += dt;

      const drain = 0.7 * dt
        + (state.leftDoor ? 0.9 * dt : 0)
        + (state.rightDoor ? 0.9 * dt : 0)
        + (state.light ? 1.2 * dt : 0)
        + (state.camMode ? 1.25 * dt : 0);
      state.power = Math.max(0, state.power - drain);

      if (state.power <= 0) {
        state.leftDoor = false;
        state.rightDoor = false;
        state.light = false;
        state.camMode = false;
        hallLight.intensity = 0;
      }

      const stealthPenalty = state.camMode ? -0.03 : 0.07;
      state.leftEnemyDist -= Math.max(0.02, state.leftEnemySpeed + stealthPenalty) * dt * 2.2;
      state.rightEnemyDist -= Math.max(0.02, state.rightEnemySpeed + stealthPenalty) * dt * 2.2;

      if (state.light && Math.random() < 0.035) {
        state.leftEnemyDist = Math.min(20, state.leftEnemyDist + 1.3);
        state.rightEnemyDist = Math.min(20, state.rightEnemyDist + 1.2);
        log('ライトで影が後退した。');
      }

      if (state.leftEnemyDist <= 1.3) {
        if (state.leftDoor) {
          state.leftEnemyDist = 4 + Math.random() * 3;
          log('左ドアに衝突音！なんとか防いだ。');
        } else {
          endNight(false);
        }
      }
      if (state.rightEnemyDist <= 1.3) {
        if (state.rightDoor) {
          state.rightEnemyDist = 4 + Math.random() * 3;
          log('右ドアを叩く音。去っていった…。');
        } else {
          endNight(false);
        }
      }

      state.fear += ((state.power <= 20 ? 0.6 : 0.2) + (state.camMode ? 0.08 : 0.22)) * dt * 2.8;
      state.fear = Math.min(100, state.fear);
      if (state.fear >= 100) endNight(false);

      const progress = Math.min(100, (state.t / 90) * 100);
      if (progress >= 100) endNight(true);

      const hour = 12 + Math.min(6, Math.floor(progress / (100 / 6)));
      ui.hour.textContent = hour >= 13 ? `${hour - 12} AM` : `${hour} AM`;
      ui.powerText.textContent = `${Math.floor(state.power)}%`;
      ui.powerBar.style.width = `${state.power}%`;
      ui.fear.textContent = String(Math.floor(state.fear));
      ui.progress.textContent = `${Math.floor(progress)}`;

      setButtonStates();
    }

    function updateScene(dt) {
      const leftZ = -8 - state.leftEnemyDist * 1.15;
      const rightZ = -8 - state.rightEnemyDist * 1.15;
      leftEnemy.position.z = leftZ;
      rightEnemy.position.z = rightZ;

      leftEnemy.position.x = -4.15 + Math.sin(performance.now() * 0.003) * 0.08;
      rightEnemy.position.x = 4.15 + Math.cos(performance.now() * 0.0033) * 0.08;

      leftDoor.scale.y += ((state.leftDoor ? 1 : 0.06) - leftDoor.scale.y) * Math.min(1, dt * 12);
      rightDoor.scale.y += ((state.rightDoor ? 1 : 0.06) - rightDoor.scale.y) * Math.min(1, dt * 12);

      if (state.camMode) {
        camera.position.lerp(new THREE.Vector3(0, 6.6, 18), Math.min(1, dt * 4));
        camera.lookAt(0, 2, -20);
      } else {
        camera.position.lerp(new THREE.Vector3(0, 4.5, 12), Math.min(1, dt * 4));
        camera.lookAt(0, 2.2, -10);
      }

      desk.rotation.y = Math.sin(performance.now() * 0.0004) * 0.02;
    }

    function animate() {
      const dt = Math.min(0.05, clock.getDelta());
      updateGame(dt);
      updateScene(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    ui.startBtn.addEventListener('click', () => {
      state.running = true;
      resetNight();
    });
    ui.leftBtn.addEventListener('click', toggleLeftDoor);
    ui.rightBtn.addEventListener('click', toggleRightDoor);
    ui.lightBtn.addEventListener('click', toggleLight);
    ui.camBtn.addEventListener('click', toggleCam);

    addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'q') toggleLeftDoor();
      if (key === 'e') toggleRightDoor();
      if (key === 'f') toggleLight();
      if (key === 'c') toggleCam();
    });

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    animate();
  </script>
</body>
</html>
